# kitty.conf

# Set Beam Cursor (vertical line)
cursor_shape beam

# Use JetBrainsMono Nerd Font (make sure it is installed)
font_family JetBrainsMono Nerd Font

# Disable "Ask When Closing" dialog
confirm_os_window_close 0

# Catppuccin Mocha color scheme
background #1e1e2e
foreground #d9e0ee
cursor #f5c2e7
selection_background #414268
selection_foreground #e0dfe7

# Colors for the Catppuccin Mocha palette
color0 #6e6a86
color1 #f28fad
color2 #a6d189
color3 #eed49f
color4 #8aadf4
color5 #d1a3a1
color6 #a4b8f0
color7 #d9e0ee
color8 #4c4a68
color9 #f28fad
color10 #a6d189
color11 #eed49f
color12 #8aadf4
color13 #d1a3a1
color14 #a4b8f0
color15 #e1e3e8

